<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>学词宝 - 英语·语文学习</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#2c3e50;touch-action:manipulation}
#app{position:relative;width:100%;height:100%;max-width:480px;margin:0 auto;overflow:hidden;background:#f0f2f5}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;overflow-y:auto}
.screen.active{display:flex}
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:12px;font-size:16px;font-weight:600;padding:16px 32px;cursor:pointer;min-height:52px;touch-action:manipulation}
.btn:active{transform:scale(.96)}
.btn-primary{background:#4a6cf7;color:#fff}
.btn-outline{background:transparent;border:2px solid #4a6cf7;color:#4a6cf7}
.btn-block{width:100%}
.btn-sm{padding:10px 20px;font-size:14px;min-height:40px}
.header{display:flex;align-items:center;padding:12px 16px;gap:12px;background:#fff;border-bottom:1px solid rgba(0,0,0,.05);flex-shrink:0}
.header .back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;background:#f0f2f5;border-radius:50%;cursor:pointer;font-size:20px;flex-shrink:0}
.header h1{flex:1;font-size:18px;font-weight:700;text-align:center}
.header .ph{width:36px;flex-shrink:0}
.ct{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column}
.home{background:linear-gradient(135deg,#4a6cf7,#3a56d4 60%,#2d3fa0)}
.home .ct{align-items:center;justify-content:center;gap:20px}
.home-logo{width:80px;height:80px;background:rgba(255,255,255,.2);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:40px}
.home-title{color:#fff;font-size:28px;font-weight:800;letter-spacing:2px}
.home-sub{color:rgba(255,255,255,.7);font-size:14px;text-align:center;line-height:1.6}
.sc{display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;margin-top:16px}
.sc-item{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:20px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:14px}
.sc-item:active{transform:scale(.97);background:rgba(255,255,255,.25)}
.sc-item .ico{font-size:32px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.2);border-radius:12px;flex-shrink:0}
.sc-item .info{flex:1}
.sc-item .nm{font-size:18px;font-weight:700}
.sc-item .ds{font-size:12px;opacity:.7;margin-top:2px}
.sc-item .ar{font-size:18px;opacity:.5}
.gg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.gb{background:#fff;border:2px solid #eee;border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer}
.gb:active{transform:scale(.97);border-color:#4a6cf7}
.gb .gn{font-size:32px;font-weight:800;color:#4a6cf7}
.gb .gl{font-size:14px;color:#95a5a6;margin-top:4px}
.mg{display:flex;flex-direction:column;gap:10px}
.mi{background:#fff;border-radius:14px;padding:16px;cursor:pointer;display:flex;align-items:center;gap:14px;border:none;text-align:left;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.mi:active{transform:scale(.98)}
.mi .ico{font-size:28px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:#f0f2f5;border-radius:12px;flex-shrink:0}
.mi .info{flex:1}
.mi .nm{font-size:16px;font-weight:700}
.mi .ds{font-size:12px;color:#95a5a6;margin-top:2px}
.ms{background:#fff;border-radius:14px;padding:12px 16px;display:flex;justify-content:space-around;margin-top:8px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.si{text-align:center}
.si .num{font-size:22px;font-weight:800;color:#4a6cf7}
.si .lb{font-size:11px;color:#95a5a6;margin-top:2px}
.sd{width:1px;background:#eee}
.sp{width:100%;margin-bottom:12px}
.pb{height:5px;background:#e8ecf0;border-radius:3px;overflow:hidden}
.pb .fl{height:100%;background:linear-gradient(90deg,#4a6cf7,#6b8aff);border-radius:3px;transition:width .4s}
.pt{display:flex;justify-content:space-between;font-size:12px;color:#95a5a6;margin-top:4px}
.fc{width:100%;flex:1;min-height:200px;background:#fff;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;position:relative;cursor:pointer;margin-bottom:12px;border:2px solid transparent;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.fc.rv{border-color:#4a6cf7}
.fc .wd{font-size:36px;font-weight:800;color:#2c3e50;margin-bottom:6px;text-align:center;word-break:break-word}
.fc .ph{font-size:15px;color:#95a5a6;margin-bottom:10px}
.fc .mh{font-size:13px;color:#95a5a6;opacity:.6}
.fc .me{font-size:20px;font-weight:700;color:#4a6cf7;text-align:center;margin-top:6px}
.fc .ms{font-size:14px;color:#95a5a6;margin-top:4px;text-align:center}
.fc .spk{position:absolute;top:12px;right:12px;width:40px;height:40px;border:none;background:#f0f2f5;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sa{display:flex;gap:10px;width:100%;padding-bottom:4px}
.sa .btn{flex:1}
.qi{width:100%;display:flex;justify-content:space-between;font-size:13px;color:#95a5a6;margin-bottom:10px}
.qc{width:100%;background:#fff;border-radius:14px;padding:20px;margin-bottom:12px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.qc .wd{font-size:34px;font-weight:800;margin-bottom:4px}
.qc .ph{font-size:14px;color:#95a5a6}
.qo{display:flex;flex-direction:column;gap:8px;width:100%;flex:1}
.qoi{background:#fff;border:2px solid #e8ecf0;border-radius:12px;padding:14px 16px;font-size:16px;cursor:pointer;text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center}
.qoi:active{transform:scale(.97)}
.qoi.cr{background:#eafaf1;border-color:#2ecc71;color:#2ecc71;font-weight:700}
.qoi.wr{background:#fdedec;border-color:#ff6b6b;color:#ff6b6b}
.qoi.di{pointer-events:none;opacity:.8}
.qr{text-align:center;padding:32px 16px}
.qr .em{font-size:56px;margin-bottom:12px}
.qr .sc{font-size:40px;font-weight:800;color:#4a6cf7}
.qr .lb{font-size:15px;color:#95a5a6;margin:6px 0}
.re{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#95a5a6;gap:10px}
.re .ico{font-size:56px;opacity:.5}
.sh{background:#fff;border-radius:14px;padding:20px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.sh .bn{font-size:40px;font-weight:800;color:#4a6cf7}
.sh .sb{color:#95a5a6;font-size:14px;margin-top:4px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scd{background:#fff;border-radius:12px;padding:14px;text-align:center}
.scd .num{font-size:24px;font-weight:800;color:#4a6cf7}
.scd .lb{font-size:12px;color:#95a5a6;margin-top:2px}
@keyframes pop{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.po{animation:pop .3s ease}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;max-width:300px;text-align:center;pointer-events:none}
</style>
</head>

      <div class="mi" onclick="mq()"><div class="ico" style="background:#fff3e0;color:#f90">✍️</div><div class="info"><div class="nm">测验模式</div><div class="ds">四选一，检验掌握</div></div><div class="ar">›</div></div>
      <div class="mi" onclick="mr()"><div class="ico" style="background:#fce4ec;color:#ff6b6b">🔄</div><div class="info"><div class="nm">错题复习</div><div class="ds">重温不会的词</div></div><div class="ar">›</div></div>
      <div class="mi" onclick="mst()"><div class="ico" style="background:#e8f5e9;color:#2ecc71">📊</div><div class="info"><div class="nm">学习进度</div><div class="ds">查看统计</div></div><div class="ar">›</div></div>
    </div>
    <div class="ms" id="u1"></div>
  </div>
</div>
<div id="s3" class="screen">
  <div class="header"><button class="back" onclick="b2()">‹</button><h1 id="t3">学习</h1><div class="ph"></div></div>
  <div class="ct">
    <div class="sp"><div class="pb"><div class="fl" id="p1" style="width:0%"></div></div><div class="pt"><span id="p2">1/10</span><span id="p3">0%</span></div></div>
    <div class="fc" id="fc1" onclick="rc()">
      <button class="spk" id="sk1" onclick="event.stopPropagation();sp()">🔊</button>
      <div class="wd" id="f1">word</div>
      <div class="ph" id="f2">/wɜːd/</div>
      <div class="mh" id="f3">👆 点击查看释义</div>
      <div class="me" id="f4" style="display:none"></div>
      <div class="ms" id="f5" style="display:none"></div>
    </div>
    <div class="sa" id="f6" style="display:none">
      <button class="btn btn-outline" onclick="mk(0)" style="border-color:#ff6b6b;color:#ff6b6b">😅 还要练</button>
      <button class="btn btn-primary" onclick="mk(1)">✅ 知道了</button>
    </div>
  </div>
</div>
<div id="s4" class="screen">
  <div class="header"><button class="back" onclick="b3()">‹</button><h1 id="t4">测验</h1><div class="ph"></div></div>
  <div class="ct">
    <div class="qi"><span id="q1">第 1 题</span><span id="q2">✓ 0 | ✗ 0</span></div>
    <div class="qc"><div class="wd" id="q3">word</div><div class="ph" id="q4"></div></div>
    <div class="qo" id="q5"></div>
  </div>
</div>
<div id="s5" class="screen">
  <div class="header"><button class="back" onclick="b1()">‹</button><h1>错题复习</h1><div class="ph"></div></div>
  <div class="ct" id="r1"></div>
</div>
<div id="s6" class="screen">
  <div class="header"><button class="back" onclick="b1()">‹</button><h1>学习进度</h1><div class="ph"></div></div>
  <div class="ct" id="st1"></div>
</div>
