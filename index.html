<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>词语星球 - 英语单词 & 中文生字学习</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f23;--card:rgba(255,255,255,0.06);--card-hover:rgba(255,255,255,0.1);--text:#e8e8ff;--text2:rgba(232,232,255,0.6);--text3:rgba(232,232,255,0.35);--primary:#6c5ce7;--primary2:#a29bfe;--success:#00cec9;--danger:#ff7675;--warn:#fdcb6e;--shadow:0 8px 32px rgba(0,0,0,0.3);--radius:16px;--radius-sm:10px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100%;touch-action:manipulation;-webkit-font-smoothing:antialiased}
/* Stars background */
#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#app{position:relative;width:100%;height:100%;max-width:480px;margin:0 auto;z-index:1;overflow:hidden}
.page{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;overflow-y:auto;padding:0 16px 16px;transition:opacity .35s,transform .35s}
.page.active{display:flex}
.page.exit{opacity:0;transform:translateX(30px)}
.page.enter{animation:pageIn .35s ease}
@keyframes pageIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
/* Header */
.hd{display:flex;align-items:center;padding:16px 0;gap:8px;flex-shrink:0;min-height:60px}
.hd .bk{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;background:var(--card);border-radius:50%;cursor:pointer;color:var(--text);font-size:18px;transition:background .2s;flex-shrink:0}
.hd .bk:active{background:var(--card-hover)}
.hd h2{flex:1;font-size:17px;font-weight:600;text-align:center;color:var(--text2)}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:12px;font-size:15px;font-weight:600;padding:14px 24px;cursor:pointer;transition:all .2s;min-height:48px}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--primary);color:#fff}
.btn-s{background:#00cec9;color:#fff}
.btn-o{background:transparent;border:1px solid var(--text3);color:var(--text2)}
.btn-block{width:100%}
.btn-sm{padding:10px 16px;font-size:13px;min-height:36px;border-radius:8px}
/* Home */
.pg0{align-items:center;justify-content:center;gap:10px}
.pg0 .logo{width:80px;height:80px;background:linear-gradient(135deg,var(--primary),#fd79a8);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:0 8px 32px rgba(108,92,231,0.35)}
.pg0 .ht{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--primary2),#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:4px}
.pg0 .hs{font-size:13px;color:var(--text3);text-align:center;line-height:1.6;margin:2px 0 10px}
.sc{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.sci{background:var(--card);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .25s}
.sci:active{transform:scale(.97);background:var(--card-hover)}
.sci .ico{font-size:28px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);border-radius:12px;flex-shrink:0}
.sci .if{flex:1}.sci .nm{font-size:16px;font-weight:600}.sci .ds{font-size:12px;color:var(--text3);margin-top:1px}
.sci .ar{font-size:16px;color:var(--text3)}
/* Grade grid */
.gg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.gb{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .25s}
.gb:active{transform:scale(.96);border-color:var(--primary)}
.gb .gn{font-size:32px;font-weight:800;color:var(--primary2)}
.gb .gl{font-size:13px;color:var(--text3);margin-top:4px}
/* Menu */
.mg{display:flex;flex-direction:column;gap:8px}
.mi{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;width:100%}
.mi:active{transform:scale(.98);background:var(--card-hover)}
.mi .ico{font-size:24px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);border-radius:10px;flex-shrink:0}
.mi .if{flex:1}.mi .nm{font-size:15px;font-weight:600}.mi .ds{font-size:12px;color:var(--text3);margin-top:1px}
.ms{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:12px 16px;display:flex;justify-content:space-around;margin-top:6px}
.msi{text-align:center}.msi .mn{font-size:20px;font-weight:700;color:var(--primary2)}
.msi .ml{font-size:11px;color:var(--text3);margin-top:2px}
.msd{width:1px;background:rgba(255,255,255,0.08)}
/* Study card flip */
.sp{width:100%;margin-bottom:8px}
.pb{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.pb .fl{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary2));border-radius:2px;transition:width .4s}
.pt{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px}
.card-container{width:100%;perspective:800px;margin-bottom:10px;flex:1}
.card-flipper{position:relative;width:100%;height:100%;min-height:220px;transition:transform .6s;transform-style:preserve-3d;cursor:pointer}
.card-flipper.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;border:1px solid rgba(255,255,255,0.08);background:var(--card)}
.card-back{background:linear-gradient(135deg,rgba(108,92,231,0.15),rgba(253,121,168,0.1));transform:rotateY(180deg)}
.card-face .wd{font-size:34px;font-weight:700;margin-bottom:6px;text-align:center;word-break:break-word}
.card-face .ph{font-size:14px;color:var(--text3);margin-bottom:8px}
.card-face .hint{font-size:13px;color:var(--text3);opacity:.5}
.card-face .ans{font-size:20px;font-weight:600;color:var(--primary2);text-align:center;margin-top:4px;line-height:1.5}
.sa{display:flex;gap:8px;width:100%;padding-bottom:4px}.sa .btn{flex:1;font-size:14px}
/* Quiz */
.qi{width:100%;display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:8px}
.qc{width:100%;background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:18px;margin-bottom:12px;text-align:center}
.qc .wd{font-size:32px;font-weight:700}
.qo{display:flex;flex-direction:column;gap:8px;width:100%;flex:1}
.qoi{background:var(--card);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;font-size:15px;cursor:pointer;text-align:center;min-height:46px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qoi:active{transform:scale(.97)}
.qoi.cr{border-color:#00cec9;background:rgba(0,206,201,0.1);color:#00cec9;font-weight:600}
.qoi.wr{border-color:#ff7675;background:rgba(255,118,117,0.1);color:#ff7675}
.qoi.di{pointer-events:none;opacity:.6}
/* Stars */
.re{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:8px}
.re .ico{font-size:56px;opacity:.4}
/* Stats */
.sh{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:18px;text-align:center;margin-bottom:10px}
.sh .bn{font-size:38px;font-weight:800;color:var(--primary2)}
.sh .sb{font-size:13px;color:var(--text3);margin-top:4px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.scd{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px;text-align:center}
.scd .sn{font-size:22px;font-weight:700;color:var(--primary2)}
.scd .sl{font-size:11px;color:var(--text3);margin-top:2px}
/* Streak */
.streak{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px}
.streak h3{font-size:13px;color:var(--text3);margin-bottom:8px;font-weight:500}
.streak-dots{display:flex;gap:4px;flex-wrap:wrap}
.streak-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;background:rgba(255,255,255,0.05);color:var(--text3)}
.streak-dot.done{background:var(--primary);color:#fff}
.streak-dot.today{border:2px solid var(--primary2);background:rgba(108,92,231,0.15)}
/* Toggle */
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer}
.toggle-wrap .lb{font-size:14px;color:var(--text2)}
.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,0.1);position:relative;transition:background .3s;flex-shrink:0}
.toggle.on{background:var(--primary)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .3s}
.toggle.on::after{transform:translateX(20px)}
/* Misc */
.ct{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding-top:4px}
.qr{text-align:center;padding:24px 12px}
.qr .em{font-size:52px;margin-bottom:10px}.qr .sc{font-size:36px;font-weight:800;color:var(--primary2)}
.qr .lb{font-size:14px;color:var(--text3);margin:4px 0}
/* Dark adjustments */
@media(prefers-color-scheme:light){:root{--bg:#f5f6fa;--card:#fff;--card-hover:#f0f0f5;--text:#2d3436;--text2:#636e72;--text3:#b2bec3;--shadow:0 4px 20px rgba(0,0,0,0.06)}
.gb,.mi,.ms,.qc,.qoi,.scd,.sh,.streak{box-shadow:0 2px 8px rgba(0,0,0,0.04)}
}
</style>
</head>

<canvas id="stars"></canvas>
<div id="app">
<!-- Home -->
<div id="p0" class="page active pg0">
  <div class="logo">📚</div>
  <div class="ht">词语星球</div>
  <div class="hs">小学四年级 → 初中一年级<br>英语单词 &amp; 中文生字 智能学习</div>

    <div class="sci" id="btn-zh"><div class="ico">🀄</div><div class="if"><div class="nm">中文生字</div><div class="ds">人教版同步</div></div><div class="ar">›</div></div>
  </div>
  <div class="toggle-wrap" id="dark-toggle" style="margin-top:16px;max-width:320px;width:100%">
    <span class="lb">深色模式</span>
    <div class="toggle on" id="dark-switch"></div>
  </div>
</div>
<!-- Grade -->
<div id="p1" class="page"><div class="hd"><button class="bk" id="b1">‹</button><h2>选择年级</h2><div class="bk" style="visibility:hidden">‹</div></div><div class="ct"><div class="gg" id="g1"></div></div></div>
<!-- Menu -->
<div id="p2" class="page"><div class="hd"><button class="bk" id="b2">‹</button><h2 id="t2">学习中心</h2><div class="bk" style="visibility:hidden">‹</div></div><div class="ct">
<div class="mg">
<div class="mi" id="btn-stu"><div class="ico" style="background:rgba(108,92,231,0.15);color:#6c5ce7">📖</div><div class="if"><div class="nm">学习模式</div><div class="ds">看词回想，点击翻转卡片</div></div><div class="ar">›</div></div>
<div class="mi" id="btn-quiz"><div class="ico" style="background:rgba(253,203,110,0.15);color:#fdcb6e">✍️</div><div class="if"><div class="nm">测验模式</div><div class="ds">四选一检验掌握程度</div></div><div class="ar">›</div></div>
<div class="mi" id="btn-rev"><div class="ico" style="background:rgba(255,118,117,0.15);color:#ff7675">🔄</div><div class="if"><div class="nm">错题复习</div><div class="ds">重温不会的单词/生字</div></div><div class="ar">›</div></div>
<div class="mi" id="btn-stats"><div class="ico" style="background:rgba(0,206,201,0.15);color:#00cec9">📊</div><div class="if"><div class="nm">学习进度</div><div class="ds">查看学习记录和统计</div></div><div class="ar">›</div></div>
</div><div class="ms" id="ms"></div></div></div>
<!-- Study -->
<div id="p3" class="page"><div class="hd"><button class="bk" id="b3">‹</button><h2 id="t3">学习</h2><div class="bk" style="visibility:hidden">‹</div></div><div class="ct">
<div class="sp"><div class="pb"><div class="fl" id="sbar" style="width:0%"></div></div><div class="pt"><span id="spos">1/10</span><span id="spct">0%</span></div></div>
<div class="card-container"><div class="card-flipper" id="flipper">
<div class="card-face"><div class="wd" id="sw">word</div><div class="ph" id="sph" style="display:none">/wɜːd/</div><div class="hint" id="shint">👆 点击翻转</div></div>
<div class="card-face card-back"><div class="hint" style="opacity:.4;margin-bottom:4px;font-size:12px">释义</div><div class="ans" id="sans"></div></div>
</div></div>
<div class="sa" id="sbtns" style="display:none">
<button class="btn btn-o" id="sno" style="flex:1;border-color:#ff7675;color:#ff7675">😅 还要练</button>
<button class="btn btn-s" id="syes" style="flex:1">✅ 知道了</button>
</div></div></div>
<!-- Quiz -->
<div id="p4" class="page"><div class="hd"><button class="bk" id="b4">‹</button><h2 id="t4">测验</h2><div class="bk" style="visibility:hidden">‹</div></div><div class="ct">
<div class="qi"><span id="qpos">第 1 题</span><span id="qscore">✓ 0 | ✗ 0</span></div>
<div class="qc"><div class="wd" id="qw">word</div></div>
<div class="qo" id="qopts"></div></div></div>
<!-- Review -->
<div id="p5" class="page"><div class="hd"><button class="bk" id="b5">‹</button><h2>错题复习</h2><div class="bk" style="visibility:hidden">‹</div></div><div class="ct" id="rct"></div></div>
<!-- Stats -->
<div id="p6" class="page"><div class="hd"><button class="bk" id="b6">‹</button><h2>学习进度</h2><div class="bk" style="visibility:hidden">‹</div></div><div class="ct" id="sct"></div></div>
</div>
<script>
// Stars animation
var c=document.getElementById('stars'),ctx=c.getContext('2d');
c.width=window.innerWidth;c.height=window.innerHeight;
var stars=[];
for(var i=0;i<80;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+0.3,v:Math.random()*0.3+0.1});
function drawStars(){ctx.clearRect(0,0,c.width,c.height);for(var i=0;i<stars.length;i++){var s=stars[i];ctx.fillStyle='rgba(255,255,255,'+(Math.random()*0.3+0.2)+')';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();s.y-=s.v;if(s.y<0){s.y=c.height;s.x=Math.random()*c.width}}requestAnimationFrame(drawStars)}
drawStars();
