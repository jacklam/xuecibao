<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>学词宝 - 英语·语文学习</title>
<style>
:root{--primary:#4A6CF7;--primary-light:#6B8AFF;--secondary:#FF6B6B;--success:#2ECC71;--warning:#F39C12;--bg:#F0F2F5;--card:#FFFFFF;--text:#2C3E50;--text-light:#95A5A6;--radius:16px;--shadow:0 4px 20px rgba(0,0,0,0.08);--shadow-lg:0 8px 40px rgba(0,0,0,0.12);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
body{user-select:none;touch-action:manipulation}
#app{position:relative;width:100%;height:100%;max-width:480px;margin:0 auto;overflow:hidden;background:var(--bg)}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:flex}.screen.slide-in{animation:slideIn .3s ease forwards}
@keyframes slideIn{from{transform:translateX(100%);opacity:.8}to{transform:translateX(0);opacity:1}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;font-size:16px;font-weight:600;padding:16px 32px;cursor:pointer;transition:all .3s;min-height:52px}
.btn:active{transform:scale(.96)}.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
.btn-block{width:100%}.btn-sm{padding:10px 20px;font-size:14px;min-height:40px}
.header{display:flex;align-items:center;padding:16px;gap:12px;background:var(--card);border-bottom:1px solid rgba(0,0,0,.05);flex-shrink:0;min-height:60px}
.header .back{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:none;background:var(--bg);border-radius:50%;cursor:pointer;font-size:20px;flex-shrink:0}
.header h1{flex:1;font-size:18px;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header .placeholder{width:40px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column}
#s-home{background:linear-gradient(135deg,#4A6CF7,#3A56D4 60%,#2D3FA0)}
#s-home .content{align-items:center;justify-content:center;gap:24px;padding:40px 24px}
.home-logo{width:96px;height:96px;background:rgba(255,255,255,.2);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:48px;backdrop-filter:blur(10px);margin-bottom:8px}
.home-title{color:#fff;font-size:32px;font-weight:800;letter-spacing:2px}
.home-sub{color:rgba(255,255,255,.7);font-size:16px;text-align:center;line-height:1.6}
.subject-grid{display:flex;flex-direction:column;gap:16px;width:100%;max-width:320px;margin-top:20px}
.subject-card{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:24px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:16px}
.subject-card:active{transform:scale(.97);background:rgba(255,255,255,.25)}
.subject-card .icon{font-size:36px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.2);border-radius:14px;flex-shrink:0}
.subject-card .info{flex:1}.subject-card .name{font-size:20px;font-weight:700}
.subject-card .desc{font-size:13px;opacity:.7;margin-top:2px}.subject-card .arrow{font-size:20px;opacity:.5}
.grade-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grade-btn{background:var(--card);border:2px solid transparent;border-radius:var(--radius);padding:24px 16px;text-align:center;cursor:pointer;box-shadow:var(--shadow)}
.grade-btn:active{transform:scale(.97);border-color:var(--primary)}
.grade-btn .num{font-size:36px;font-weight:800;color:var(--primary)}
.grade-btn .label{font-size:15px;color:var(--text-light);margin-top:4px}
.menu-grid{display:flex;flex-direction:column;gap:12px}
.menu-btn{background:var(--card);border-radius:var(--radius);padding:20px;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;border:none;text-align:left;width:100%}
.menu-btn:active{transform:scale(.98)}
.menu-btn .icon{font-size:32px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:12px;flex-shrink:0}
.menu-btn .info{flex:1}.menu-btn .info .name{font-size:17px;font-weight:700}
.menu-btn .info .desc{font-size:13px;color:var(--text-light);margin-top:2px}
.menu-btn .arrow{color:var(--text-light);font-size:18px}
.menu-stats{background:var(--card);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);display:flex;justify-content:space-around;margin-top:8px}
.stat-item{text-align:center}.stat-item .num{font-size:24px;font-weight:800;color:var(--primary)}
.stat-item .label{font-size:12px;color:var(--text-light);margin-top:2px}
.stat-divider{width:1px;background:#eee}
.study-progress{width:100%;margin-bottom:16px}
.progress-bar{height:6px;background:#E8ECF0;border-radius:3px;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:3px;transition:width .4s}
.progress-text{display:flex;justify-content:space-between;font-size:13px;color:var(--text-light);margin-top:6px}
.flashcard{width:100%;flex:1;min-height:240px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative;cursor:pointer;margin-bottom:16px;border:2px solid transparent}
.flashcard.revealed{border-color:var(--primary)}
.flashcard .word{font-size:38px;font-weight:800;color:var(--text);margin-bottom:8px;text-align:center;word-break:break-word}
.flashcard .phonetic{font-size:16px;color:var(--text-light);margin-bottom:12px}
.flashcard .meaning-hint{font-size:14px;color:var(--text-light);opacity:.6}
.flashcard .meaning{font-size:22px;font-weight:700;color:var(--primary);text-align:center;margin-top:8px}
.flashcard .meaning-sub{font-size:15px;color:var(--text-light);margin-top:4px;text-align:center}
.flashcard .speak-btn{position:absolute;top:16px;right:16px;width:44px;height:44px;border:none;background:var(--bg);border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.study-actions{display:flex;gap:12px;width:100%;padding-bottom:8px}.study-actions .btn{flex:1}
.quiz-info{width:100%;display:flex;justify-content:space-between;font-size:14px;color:var(--text-light);margin-bottom:12px}
.quiz-card{width:100%;background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow);text-align:center}
.quiz-card .word{font-size:36px;font-weight:800;margin-bottom:4px}
.quiz-card .phonetic{font-size:15px;color:var(--text-light)}
.quiz-options{display:flex;flex-direction:column;gap:10px;width:100%;flex:1}
.quiz-option{background:var(--card);border:2px solid #E8ECF0;border-radius:12px;padding:16px 20px;font-size:17px;cursor:pointer;text-align:center;min-height:52px;display:flex;align-items:center;justify-content:center}
.quiz-option:active{transform:scale(.97)}
.quiz-option.correct{background:#EAFAF1;border-color:var(--success);color:var(--success);font-weight:700}
.quiz-option.wrong{background:#FDEDEC;border-color:var(--secondary);color:var(--secondary)}
.quiz-option.disabled{pointer-events:none;opacity:.8}
.quiz-result{text-align:center;padding:40px 20px}
.quiz-result .emoji{font-size:64px;margin-bottom:16px}
.quiz-result .score{font-size:48px;font-weight:800;color:var(--primary)}
.quiz-result .label{font-size:16px;color:var(--text-light);margin:8px 0}
.review-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-light);gap:12px}
.review-empty .icon{font-size:64px;opacity:.5}
.stats-header{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);text-align:center}
.stats-header .big-num{font-size:48px;font-weight:800;color:var(--primary)}
.stats-header .sub{color:var(--text-light);font-size:15px;margin-top:4px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stats-card{background:var(--card);border-radius:12px;padding:16px;text-align:center;box-shadow:var(--shadow)}
.stats-card .num{font-size:28px;font-weight:800;color:var(--primary)}
.stats-card .label{font-size:13px;color:var(--text-light);margin-top:2px}
@keyframes pop{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .3s ease}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:10px;font-size:15px;font-weight:600;max-width:320px;text-align:center;pointer-events:none}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a2e;--card:#16213e;--text:#e8e8e8;--text-light:#8892b0}.header{background:var(--card)}}
</style>
</head>
<body>
<div id="app">
<div id="s-home" class="screen active">
  <div class="content">
    <div class="home-logo">📚</div>
    <div class="home-title">学词宝</div>
    <div class="home-sub">小学四年级 → 初中一年级<br>英语单词 &amp; 语文生字 学习助手</div>
    <div class="subject-grid">
      <div class="subject-card" onclick="selectSubject('en')"><div class="icon">🇬🇧</div><div class="info"><div class="name">英语单词</div><div class="desc">PEP教材同步 · 四至七年级</div></div><div class="arrow">›</div></div>
      <div class="subject-card" onclick="selectSubject('zh')"><div class="icon">🀄</div><div class="info"><div class="name">语文生字</div><div class="desc">人教版同步 · 四至七年级</div></div><div class="arrow">›</div></div>
    </div>
  </div>
</div>
<div id="s-grade" class="screen">
  <div class="header"><button class="back" onclick="goHome()">‹</button><h1 id="grade-title">选择年级</h1><div class="placeholder"></div></div>
  <div class="content"><div class="grade-grid" id="grade-grid"></div></div>
</div>
<div id="s-menu" class="screen">
  <div class="header"><button class="back" onclick="showScreen('s-grade')">‹</button><h1 id="menu-title">学习中心</h1><div class="placeholder"></div></div>
  <div class="content">
    <div class="menu-grid">
      <div class="menu-btn" onclick="startStudy()"><div class="icon" style="background:#EBF0FF;color:#4A6CF7">📖</div><div class="info"><div class="name">学习模式</div><div class="desc">看词回想，点击揭晓答案</div></div><div class="arrow">›</div></div>
      <div class="menu-btn" onclick="startQuiz()"><div class="icon" style="background:#FFF3E0;color:#FF9800">✍️</div><div class="info"><div class="name">测验模式</div><div class="desc">四选一，检验掌握程度</div></div><div class="arrow">›</div></div>
      <div class="menu-btn" onclick="openReview()"><div class="icon" style="background:#FCE4EC;color:#FF6B6B">🔄</div><div class="info"><div class="name">错题复习</div><div class="desc">重温不会的单词/生字</div></div><div class="arrow">›</div></div>
      <div class="menu-btn" onclick="showStats()"><div class="icon" style="background:#E8F5E9;color:#2ECC71">📊</div><div class="info"><div class="name">学习进度</div><div class="desc">查看学习记录和统计</div></div><div class="arrow">›</div></div>
    </div>
    <div class="menu-stats" id="menu-stats"></div>
  </div>
</div>
<div id="s-study" class="screen">
  <div class="header"><button class="back" onclick="exitStudy()">‹</button><h1 id="study-title">学习</h1><div class="placeholder"></div></div>
  <div class="content">
    <div class="study-progress"><div class="progress-bar"><div class="fill" id="study-fill" style="width:0%"></div></div><div class="progress-text"><span id="study-pos">1/10</span><span id="study-pct">0%</span></div></div>
    <div class="flashcard" id="flashcard" onclick="revealCard()">
      <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation();speakWord()">🔊</button>
      <div class="word" id="f-word">word</div>
      <div class="phonetic" id="f-phonetic">/wɜːd/</div>
      <div class="meaning-hint" id="f-hint">👆 点击查看释义</div>
      <div class="meaning" id="f-meaning" style="display:none"></div>
      <div class="meaning-sub" id="f-meaning-sub" style="display:none"></div>
    </div>
    <div class="study-actions" id="study-actions" style="display:none">
      <button class="btn btn-outline" onclick="markStudy(false)" style="border-color:#FF6B6B;color:#FF6B6B">😅 还要练</button>
      <button class="btn btn-primary" onclick="markStudy(true)">✅ 知道了</button>
    </div>
  </div>
</div>
<div id="s-quiz" class="screen">
  <div class="header"><button class="back" onclick="exitQuiz()">‹</button><h1 id="quiz-title">测验</h1><div class="placeholder"></div></div>
  <div class="content">
    <div class="quiz-info"><span id="quiz-pos">第 1 题</span><span id="quiz-score">✓ 0 | ✗ 0</span></div>
    <div class="quiz-card"><div class="word" id="q-word">word</div><div class="phonetic" id="q-phonetic"></div></div>
    <div class="quiz-options" id="q-options"></div>
  </div>
</div>
<div id="s-review" class="screen">
  <div class="header"><button class="back" onclick="showScreen('s-menu')">‹</button><h1>错题复习</h1><div class="placeholder"></div></div>
  <div class="content" id="review-content"></div>
</div>
<div id="s-stats" class="screen">
  <div class="header"><button class="back" onclick="showScreen('s-menu')">‹</button><h1>学习进度</h1><div class="placeholder"></div></div>
  <div class="content" id="stats-content"></div>
</div>
</div>

var S={subj:null,grade:null,mode:'study',idx:0,revealed:false,reviewing:[],reviewIdx:0,
  quiz:{correct:0,wrong:0,total:0,answers:[],opts:[],answerIdx:-1,answered:false,idx:0}};
/* ========== HELPERS ========== */
function $(id){return document.getElementById(id)}
function words(){return DATA[S.subj][S.grade]}
function totalW(){return words().length}
function storeKey(k){return 'xcb_'+S.subj+'_'+S.grade+'_'+k}
function loadSet(k){try{return new Set(JSON.parse(localStorage.getItem(storeKey(k))||'[]'))}catch(e){return new Set}}
function saveSet(k,s){localStorage.setItem(storeKey(k),JSON.stringify([...s]))}
function getKnownSet(){return loadSet('known')}
function addKnown(i){var s=getKnownSet();s.add(i);saveSet('known',s)}
function getWrongSet(){return loadSet('wrong')}
function addWrong(i){var s=getWrongSet();s.add(i);saveSet('wrong',s)}
function removeWrong(i){var s=getWrongSet();s.delete(i);saveSet('wrong',s)}
function getWrongList(){return[...getWrongSet()].sort(function(a,b){return a-b})}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
/* ========== NAVIGATION ========== */
var sc=[];
function showScreen(id,anim){
  if(anim===undefined)anim=true;
  var els=document.querySelectorAll('.screen');
  for(var i=0;i<els.length;i++){els[i].classList.remove('active');els[i].classList.remove('slide-in');}
  var el=document.getElementById(id);
  if(anim)el.classList.add('slide-in');
  el.classList.add('active');
  if(!sc.length||sc[sc.length-1]!==id)sc.push(id);
}
function goHome(){showScreen('s-home')}
function toast(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2000)}
/* ========== SUBJECT & GRADE ========== */
function selectSubject(s){
  S.subj=s;
  $('#grade-title').textContent=s==='en'?'选择年级 - 英语单词':'选择年级 - 语文生字';
  var grid=$('#grade-grid');grid.innerHTML='';
  var grades=[{g:4,l:'四年级'},{g:5,l:'五年级'},{g:6,l:'六年级'},{g:7,l:'初一年级'}];
  for(var i=0;i<grades.length;i++){
    var gd=grades[i];var d=document.createElement('div');d.className='grade-btn';
    d.innerHTML='<div class="num">'+gd.g+'</div><div class="label">'+gd.l+'</div>';
    d.onclick=(function(g){return function(){selectGrade(g)}})(gd.g);
    grid.appendChild(d);
  }
  showScreen('s-grade');
}
function selectGrade(g){
  S.grade=g;
  var gn={4:'四年级',5:'五年级',6:'六年级',7:'初一年级'};
  $('#menu-title').textContent=(S.subj==='en'?'英语':'语文')+' · '+gn[g];
  showScreen('s-menu');updateMenuStats();
}
function updateMenuStats(){
  var kn=getKnownSet().size,tw=totalW(),wr=getWrongSet().size;
  $('#menu-stats').innerHTML=kn||wr?
    '<div class="stat-item"><div class="num">'+kn+'</div><div class="label">已掌握</div></div>'+
    '<div class="stat-divider"></div>'+
    '<div class="stat-item"><div class="num">'+tw+'</div><div class="label">总词数</div></div>'+
    '<div class="stat-divider"></div>'+
    '<div class="stat-item"><div class="num">'+wr+'</div><div class="label">待复习</div></div>'
    :'<div style="text-align:center;color:var(--text-light);font-size:14px;width:100%">开始学习吧 📖</div>';
}
/* ========== STUDY ========== */
var studyOrder=[];
function startStudy(){
  S.idx=0;S.revealed=false;
  var gn={4:'四年级',5:'五年级',6:'六年级',7:'初一年级'};
  $('#study-title').textContent=(S.subj==='en'?'英语 ':'语文 ')+gn[S.grade]+' · 学习';
  studyOrder=shuffle([...Array(totalW()).keys()]);
  showScreen('s-study');showStudyWord();
}
function showStudyWord(){
  var w=words()[studyOrder[S.idx]];S.revealed=false;
  var c=$('#flashcard');c.classList.remove('revealed');
  $('#f-word').textContent=w[0];
  $('#f-phonetic').textContent=S.subj==='en'?w[2]:w[1];
  $('#f-meaning').style.display='none';$('#f-meaning-sub').style.display='none';
  $('#f-hint').style.display='block';
  $('#f-meaning').textContent='';$('#f-meaning-sub').textContent='';
  $('#study-actions').style.display='none';
  $('#speak-btn').style.display=S.subj==='en'?'flex':'none';
  var p=((S.idx+1)/studyOrder.length*100).toFixed(0);
  $('#study-fill').style.width=p+'%';
  $('#study-pos').textContent=(S.idx+1)+'/'+studyOrder.length;
  $('#study-pct').textContent=p+'%';
}
function revealCard(){
  if(S.revealed)return;S.revealed=true;
  var w=words()[studyOrder[S.idx]];var c=$('#flashcard');c.classList.add('revealed');
  $('#f-hint').style.display='none';
  $('#f-meaning').style.display='block';
  $('#f-meaning').textContent=S.subj==='en'?w[1]:w[1].split(' ').slice(1).join(' ');
  if(S.subj==='zh'){$('#f-meaning-sub').style.display='block';$('#f-meaning-sub').textContent=w[2];}
  $('#study-actions').style.display='flex';
  var m=$('#f-meaning');m.classList.remove('pop');void m.offsetWidth;m.classList.add('pop');
}
function markStudy(k){
  var i=studyOrder[S.idx];
  if(k){addKnown(i);removeWrong(i);}else addWrong(i);
  S.idx++;
  if(S.idx>=studyOrder.length){toast('🎉 本轮学习完成！');showScreen('s-menu');updateMenuStats();return;}
  showStudyWord();
}
function exitStudy(){showScreen('s-menu');updateMenuStats()}
/* ========== QUIZ ========== */
var quizOrder=[];

  var gn={4:'四年级',5:'五年级',6:'六年级',7:'初一年级'};

  showScreen('s-quiz');showQuestion();
}

  S.quiz.answered=false;var wi=S.quiz.answers[idx];var w=words()[wi];var all=words();
  $('#q-word').textContent=w[0];
  $('#q-phonetic').textContent=S.subj==='en'?w[2]:'';
  $('#quiz-pos').textContent='第 '+(idx+1)+' 题 / 共 '+S.quiz.total+' 题';
  $('#quiz-score').textContent='✓ '+S.quiz.correct+' | ✗ '+S.quiz.wrong;
  var opts=[wi];var pool=[];for(var i=0;i<all.length;i++){if(i!==wi)pool.push(i)}shuffle(pool);
  for(var i=0;i<3&&i<pool.length;i++)opts.push(pool[i]);shuffle(opts);
  S.quiz.opts=opts;S.quiz.answerIdx=opts.indexOf(wi);
  var html='';
  for(var i=0;i<opts.length;i++){
    var oi=opts[i];var oi2=i;
    var lbl=S.subj==='en'?all[oi][1]:(all[oi][1].split(' ')[0]+' '+all[oi][2]);
    html+='<div class="quiz-option" onclick="answerQuestion('+oi2+')">'+lbl+'</div>';
  }
  $('#q-options').innerHTML=html;
}
function answerQuestion(oi){
  if(S.quiz.answered)return;S.quiz.answered=true;
  var c=S.quiz.answerIdx===oi;
  if(c)S.quiz.correct++;else S.quiz.wrong++;
  var opts=$('#q-options').querySelectorAll('.quiz-option');
  for(var i=0;i<opts.length;i++){
    var el=opts[i];el.classList.add('disabled');
    if(i===S.quiz.answerIdx)el.classList.add('correct');
    else if(i===oi&&!c)el.classList.add('wrong');
  }
  if(!c)addWrong(S.quiz.answers[S.quiz.idx]);
  $('#quiz-score').textContent='✓ '+S.quiz.correct+' | ✗ '+S.quiz.wrong;
  setTimeout(function(){S.quiz.idx++;showQuestion();},800);
}
function showQuizResult(){
  var p=S.quiz.total?Math.round(S.quiz.correct/S.quiz.total*100):0;
  var e=p>=90?'🏆':p>=70?'🌟':p>=50?'👍':'💪';
  $('#q-options').innerHTML='<div class="quiz-result"><div class="emoji">'+e+'</div><div class="score">'+S.quiz.correct+'/'+S.quiz.total+'</div><div class="label">正确率 '+p+'%</div><div class="detail">答对 '+S.quiz.correct+' 题 · 答错 '+S.quiz.wrong+' 题</div><div style="margin-top:24px"><button class="btn btn-primary btn-block" onclick="showScreen(\'s-menu\');updateMenuStats();">返回学习中心</button></div></div>';
}
function exitQuiz(){showScreen('s-menu');updateMenuStats()}
/* ========== REVIEW ========== */
function openReview(){
  var wl=getWrongList();
  if(!wl.length){$('#review-content').innerHTML='<div class="review-empty"><div class="icon">🎉</div><div>没有需要复习的词！</div><div style="font-size:14px">继续学习新词吧</div></div>';showScreen('s-review');return;}
  S.reviewing=wl;S.reviewIdx=0;S.revealed=false;showReviewWord();showScreen('s-review');
}
function showReviewWord(){
  if(S.reviewIdx>=S.reviewing.length){$('#review-content').innerHTML='<div class="review-empty"><div class="icon">🎉</div><div>错题全部复习完毕！</div><div style="margin-top:16px"><button class="btn btn-primary" onclick="showScreen(\'s-menu\');updateMenuStats();">返回</button></div></div>';return;}
  var wi=S.reviewing[S.reviewIdx];var w=words()[wi];S.revealed=false;
  $('#review-content').innerHTML='<div class="study-progress"><div class="progress-bar"><div class="fill" style="width:'+((S.reviewIdx+1)/S.reviewing.length*100).toFixed(0)+'%"></div></div><div class="progress-text"><span>'+(S.reviewIdx+1)+'/'+S.reviewing.length+'</span><span>错题复习</span></div></div><div class="flashcard" onclick="revealReview()"><div class="word">'+w[0]+'</div><div class="phonetic">'+(S.subj==='en'?w[2]:w[1])+'</div><div class="meaning-hint" id="rvh">👆 点击查看释义</div><div class="meaning" id="rvm" style="display:none">'+(S.subj==='en'?w[1]:w[1].split(' ').slice(1).join(' '))+'</div><div class="meaning-sub" id="rvms" style="display:none">'+(S.subj==='zh'?w[2]:'')+'</div></div><div class="study-actions" id="rva" style="display:none"><button class="btn btn-outline" onclick="nextReview(false)" style="border-color:#FF6B6B;color:#FF6B6B">😅 还要练</button><button class="btn btn-primary" onclick="nextReview(true)">✅ 记住了</button></div>';
}
function revealReview(){
  if(S.revealed)return;S.revealed=true;
  $('#rvh').style.display='none';$('#rvm').style.display='block';$('#rvms').style.display=S.subj==='zh'?'block':'none';$('#rva').style.display='flex';
}
function nextReview(k){
  var wi=S.reviewing[S.reviewIdx];
  if(k){removeWrong(wi);addKnown(wi);}else addWrong(wi);
  S.reviewIdx++;showReviewWord();
}
/* ========== STATS ========== */
function showStats(){
  var tw=totalW(),kn=getKnownSet().size,wr=getWrongSet().size,kp=tw?Math.round(kn/tw*100):0;
  var sn=S.subj==='en'?'英语':'语文';var gn={4:'四年级',5:'五年级',6:'六年级',7:'初一年级'}[S.grade];
  $('#stats-content').innerHTML='<div class="stats-header"><div class="big-num">'+kp+'%</div><div class="sub">'+sn+' · '+gn+' 掌握率</div></div><div class="stats-grid"><div class="stats-card"><div class="num" style="color:#4A6CF7">'+kn+'</div><div class="label">已掌握</div></div><div class="stats-card"><div class="num">'+tw+'</div><div class="label">总词数</div></div><div class="stats-card"><div class="num" style="color:#FF6B6B">'+wr+'</div><div class="label">待复习</div></div><div class="stats-card"><div class="num" style="color:#2ECC71">'+(tw-kn)+'</div><div class="label">待学习</div></div></div><div style="margin-top:8px"><div class="progress-bar" style="height:12px;border-radius:6px"><div class="fill" style="width:'+kp+'%;border-radius:6px"></div></div></div><div style="margin-top:auto;padding-top:16px;text-align:center"><button class="btn btn-outline btn-sm" onclick="resetProgress()">🔄 重置本年级进度</button></div>';
  showScreen('s-stats');
}
function resetProgress(){if(!confirm('确定要重置本年级所有学习进度吗？'))return;localStorage.removeItem(storeKey('known'));localStorage.removeItem(storeKey('wrong'));toast('进度已重置');showStats()}
/* ========== SPEECH ========== */
function speakWord(){var w=words()[studyOrder[S.idx]];if(!w||!window.speechSynthesis)return;var u=new SpeechSynthesisUtterance(w[0]);u.lang=S.subj==='en'?'en-US':'zh-CN';u.rate=0.9;speechSynthesis.cancel();speechSynthesis.speak(u)}
/* ========== INIT ========== */
console.log('📚 学词宝 loaded');
</script>
</body>
