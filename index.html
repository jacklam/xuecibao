<html lang="zh-CN"><head>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f23;--card:rgba(255,255,255,0.06);--text:#e8e8ff;--text2:rgba(232,232,255,0.6);--text3:rgba(232,232,255,0.35);--p:#6c5ce7;--p2:#a29bfe;--s:#00cec9;--d:#ff7675;--rad:14px}
[data-theme=light]{--bg:#f5f6fa;--card:#fff;--text:#2d3436;--text2:#636e72;--text3:#b2bec3}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100%;touch-action:manipulation;-webkit-font-smoothing:antialiased}
#root{height:100%}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#app{position:relative;width:100%;height:100%;max-width:480px;margin:0 auto;z-index:1;overflow:hidden}
.page{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;overflow-y:auto;padding:0 16px 20px}
.page.active{display:flex;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.hdr{display:flex;align-items:center;padding:16px 0 8px;gap:8px;flex-shrink:0}
.hdr .bk{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:none;background:var(--card);border-radius:50%;cursor:pointer;color:var(--text);font-size:18px;flex-shrink:0}
.hdr .bk:active{background:rgba(255,255,255,0.1)}
.hdr h2{flex:1;font-size:17px;font-weight:600;text-align:center;color:var(--text2)}
.ct{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-top:4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:12px;font-size:15px;font-weight:600;padding:14px 24px;cursor:pointer;min-height:46px}
.btn:active{transform:scale(.96)}
.btn-pri{background:var(--p);color:#fff}
.btn-suc{background:var(--s);color:#fff}
.btn-out{background:transparent;border:1.5px solid var(--text3);color:var(--text2)}
.btn-w{width:100%}
/* Home */
.home{align-items:center;justify-content:center;gap:12px;padding-top:40px}
.logo{width:76px;height:76px;background:linear-gradient(135deg,var(--p),#fd79a8);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 8px 30px rgba(108,92,231,0.3)}
.title{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--p2),#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.sub{font-size:13px;color:var(--text3);text-align:center;line-height:1.7}
.choices{display:flex;flex-direction:column;gap:10px;width:100%;max-width:310px;margin-top:8px}
.choice{background:var(--card);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px}
.choice:active{transform:scale(.97)}.choice .ic{font-size:26px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);border-radius:12px;flex-shrink:0}
.nm{font-size:16px;font-weight:600}.ds{font-size:12px;color:var(--text3);margin-top:2px}
.tog{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer;max-width:310px;width:100%;margin-top:4px}
.tog .lb{font-size:14px;color:var(--text2)}
.tog .sw{width:42px;height:24px;border-radius:12px;background:rgba(255,255,255,0.1);position:relative;flex-shrink:0}
.tog .sw.on{background:var(--p)}.tog .sw::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .3s}
.tog .sw.on::after{transform:translateX(18px)}
/* Grade */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gcard{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:22px 12px;text-align:center;cursor:pointer}
.gcard:active{transform:scale(.96);border-color:var(--p)}
.gcard .gn{font-size:30px;font-weight:800;color:var(--p2)}
.gcard .gl{font-size:13px;color:var(--text3);margin-top:4px}
/* Menu */
.mlist{display:flex;flex-direction:column;gap:10px}
.mitem{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;width:100%}
.mitem:active{transform:scale(.98)}
.mitem .ic{font-size:24px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);border-radius:12px;flex-shrink:0}
.mstats{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:12px 14px;display:flex;justify-content:space-around}
.st{text-align:center}.st .n{font-size:20px;font-weight:700;color:var(--p2)}.st .l{font-size:11px;color:var(--text3);margin-top:2px}
.sd{width:1px;background:rgba(255,255,255,0.08)}

.prog{width:100%;margin-bottom:8px}
.bar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.bar .fill{height:100%;background:linear-gradient(90deg,var(--p),var(--p2));border-radius:2px;transition:width .4s}
.pt{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px}
.cwrap{width:100%;perspective:800px;margin-bottom:10px;flex:1}
.cflip{position:relative;width:100%;height:100%;min-height:220px;transition:transform .6s;transform-style:preserve-3d;cursor:pointer}
.cflip.fl{transform:rotateY(180deg)}
.cface{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;border:1px solid rgba(255,255,255,0.08);background:var(--card)}
.cback{background:linear-gradient(135deg,rgba(108,92,231,0.12),rgba(253,121,168,0.08));transform:rotateY(180deg)}
.cface .wd{font-size:34px;font-weight:700;margin-bottom:6px;text-align:center;word-break:break-word}
.cface .hint{font-size:13px;color:var(--text3);opacity:0.5}
.cface .ans{font-size:20px;font-weight:600;color:var(--p2);text-align:center;margin-top:6px;line-height:1.5}
.actns{display:flex;gap:10px;width:100%;padding-bottom:4px}.actns .btn{flex:1;font-size:14px}
/* Quiz */
.qi{width:100%;display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:8px}
.qcard{width:100%;background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:20px;margin-bottom:12px;text-align:center}
.qcard .wd{font-size:32px;font-weight:700}
.qopts{display:flex;flex-direction:column;gap:8px;width:100%;flex:1}
.qopt{background:var(--card);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;font-size:15px;cursor:pointer;text-align:center;min-height:46px;display:flex;align-items:center;justify-content:center}
.qopt:active{transform:scale(.97)}
.qopt.cr{border-color:var(--s);background:rgba(0,206,201,0.1);color:var(--s);font-weight:600}
.qopt.wr{border-color:var(--d);background:rgba(255,118,117,0.1);color:var(--d)}
.qopt.di{pointer-events:none;opacity:0.6}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px}
.empty .ic{font-size:56px;opacity:0.4}
/* Stats */
.sh{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:18px;text-align:center;margin-bottom:6px}
.sh .bn{font-size:38px;font-weight:800;color:var(--p2)}.sh .sb{font-size:13px;color:var(--text3);margin-top:4px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.scrd{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px;text-align:center}
.scrd .sn{font-size:22px;font-weight:700;color:var(--p2)}.scrd .sl{font-size:11px;color:var(--text3);margin-top:2px}
.swrap{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:14px}
.swrap h3{font-size:13px;color:var(--text3);margin-bottom:8px;font-weight:500}
.sdots{display:flex;gap:4px;flex-wrap:wrap}
.sd0{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;background:rgba(255,255,255,0.05);color:var(--text3)}
.sd0.do{background:var(--p);color:#fff}.sd0.to{border:2px solid var(--p2);background:rgba(108,92,231,0.15)}
.chartbox{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:14px;margin-bottom:6px}
.chartbox h3{font-size:13px;color:var(--text3);margin-bottom:8px;font-weight:500}
.bch{display:flex;gap:8px;height:100px;align-items:flex-end}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bfill{width:100%;border-radius:4px 4px 0 0;min-height:4px}
.bl{font-size:9px;color:var(--text3);white-space:nowrap}
.reset{text-align:center;margin-top:8px}
.qr{text-align:center;padding:30px 16px}
.qr .em{font-size:52px;margin-bottom:12px}.qr .sc{font-size:36px;font-weight:800;color:var(--p2)}
.qr .lb{font-size:14px;color:var(--text3);margin:6px 0}
</style>

<div className="cface"><div className="wd">{cur[0]}</div><div className="hint">{fl?'':'👆 点击翻转'}</div></div>
<div className="cface cback"><div className="hint" style={{opacity:.4,marginBottom:4,fontSize:12}}>释义</div><div className="ans">{cur[1]}</div></div>
</div></div>

</div></div>)}
// Quiz
function Quiz({onBack,sub,gr}){const w=W[sub][gr];const ord=useMemo(()=>sf([...Array(w.length).keys()]),[w.length]);const tl=Math.min(ord.length,20);const ans=useMemo(()=>ord.slice(0,tl),[ord,tl]);const[idx,setIdx]=useState(0);const[cr,setCr]=useState(0);const[wr,setWr]=useState(0);const[an,setAn]=useState(false);const[dn,setDn]=useState(false);
if(dn){const p=tl?Math.round(cr/tl*100):0;const em=p>=90?'🏆':p>=70?'🌟':p>=50?'👍':'💪';return<div className="page active"><div className="ct" style={{alignItems:'center',justifyContent:'center'}}><div className="qr"><div className="em">{em}</div><div className="sc">{cr}/{tl}</div><div className="lb">正确率 {p}%</div><button className="btn btn-pri" onClick={onBack} style={{marginTop:12}}>返回</button></div></div></div>}
if(idx>=tl){setDn(true);return null}
const wi=ans[idx];const cur=w[wi];const opts=useMemo(()=>{const o=[wi];const p=[];for(let i=0;i<w.length;i++)if(i!==wi)p.push(i);sf(p);for(let i=0;i<3&&i<p.length;i++)o.push(p[i]);return sf(o)},[wi,w]);
return(<div className="page active"><div className="hdr"><button className="bk" onClick={onBack}>‹</button><h2>测验</h2></div><div className="ct">
<div className="qi"><span>第 {idx+1} 题 / 共 {tl} 题</span><span>✓ {cr} | ✗ {wr}</span></div>
<div className="qcard"><div className="wd">{cur[0]}</div></div>
<div className="qopts">{opts.map((o,i)=><div key={i} className={'qopt'+(an?(i===opts.indexOf(wi)?' cr':' di'):'')} onClick={()=>{if(an)return;setAn(true);const isC=opts[i]===wi;if(isC)setCr(c=>c+1);else setWr(c=>c+1);if(!isC){const s=ls(sk(sub,gr,'w'));s.add(wi);ss(sk(sub,gr,'w'),s)}setTimeout(()=>{setIdx(i=>i+1);setAn(false)},700)}}>{w[o][1]}</div>)}
</div></div></div>)}
// Review
function Review({onBack,sub,gr}){const w=W[sub][gr];const list=[...ls(sk(sub,gr,'w'))].sort((a,b)=>a-b);const[idx,setIdx]=useState(0);const[fl,setFl]=useState(false);
if(!list.length)return<div className="page active"><div className="ct"><div className="empty"><div className="ic">🎉</div><div>没有需要复习的词</div></div></div></div>
function next(ok){const k=ls(sk(sub,gr,'k'));const wr=ls(sk(sub,gr,'w'));if(ok){k.add(list[idx]);wr.delete(list[idx])}else{wr.add(list[idx])}ss(sk(sub,gr,'k'),k);ss(sk(sub,gr,'w'),wr);if(idx+1>=list.length){onBack();return}setFl(false);setIdx(i=>i+1)}
if(idx>=list.length)return<div className="page active"><div className="ct"><div className="empty"><div className="ic">🎉</div><div>全部复习完毕</div><button className="btn btn-pri" onClick={onBack} style={{marginTop:12}}>返回</button></div></div></div>
const cur=w[list[idx]]
return(<div className="page active"><div className="hdr"><button className="bk" onClick={onBack}>‹</button><h2>错题复习</h2></div><div className="ct">
<div className="prog"><div className="bar"><div className="fill" style={{width:((idx+1)/list.length*100).toFixed(0)+'%'}}></div></div><div className="pt"><span>{idx+1}/{list.length}</span><span>错题复习</span></div></div>
<div className="cwrap"><div className={'cflip'+(fl?' fl':'')} onClick={()=>setFl(true)}>
<div className="cface"><div className="wd">{cur[0]}</div><div className="hint">{fl?'':'👆 点击翻转'}</div></div>
<div className="cface cback"><div className="hint" style={{opacity:.4,marginBottom:4,fontSize:12}}>释义</div><div className="ans">{cur[1]}</div></div>
</div></div>
{fl&&<div className="actns"><button className="btn btn-out" onClick={()=>next(false)} style={{flex:1,borderColor:'#ff7675',color:'#ff7675'}}>😅 还要练</button><button className="btn btn-suc" onClick={()=>next(true)} style={{flex:1}}>✅ 记住了</button></div>}
</div></div>)}
// Stats
function Stats({onBack,sub,gr}){const tl=W[sub][gr].length;const kn=ls(sk(sub,gr,'k')).size;const wr=ls(sk(sub,gr,'w')).size;const p=tl?Math.round(kn/tl*100):0;const sn=sub==='en'?'英语':'语文';const gn=['四年级','五年级','六年级','初一年级'][gr-4]
const cd=[4,5,6,7].map(g=>{const t=W[sub][g].length;const k=ls(sk(sub,g,'k')).size;return{name:g+'级',已掌握:k,待学:t-k,fill:['#6c5ce7','#a29bfe','#fdcb6e','#00cec9'][g-4]}})
const mx=Math.max(...cd.map(d=>d.已掌握),1)
const td=new Date();const dots=[];for(let i=6;i>=0;i--){const d=new Date(td);d.setDate(d.getDate()-i);const done=localStorage.getItem('xcb_streak_'+d.toDateString());dots.push({day:d.getDate(),done:!!done,today:i===0})}
return(<div className="page active"><div className="hdr"><button className="bk" onClick={onBack}>‹</button><h2>学习进度</h2></div><div className="ct">
<div className="sh"><div className="bn">{p}%</div><div className="sb">{sn} · {gn} 掌握率</div></div>
<div className="sgrid"><div className="scrd"><div className="sn" style={{color:'#6c5ce7'}}>{kn}</div><div className="sl">已掌握</div></div><div className="scrd"><div className="sn">{tl}</div><div className="sl">总词数</div></div><div className="scrd"><div className="sn" style={{color:'#ff7675'}}>{wr}</div><div className="sl">待复习</div></div><div className="scrd"><div className="sn" style={{color:'#00cec9'}}>{tl-kn}</div><div className="sl">待学习</div></div></div>
<div className="bar" style={{height:8,borderRadius:4,marginBottom:8}}><div className="fill" style={{width:p+'%',borderRadius:4}}></div></div>
<div className="chartbox"><h3>📊 各年级掌握</h3><div className="bch">{cd.map(d=><div key={d.name} className="bi"><div className="bfill" style={{height:Math.max(4,d.已掌握/mx*90)+'px',background:d.fill}}></div><div className="bl">{d.name}</div></div>)}</div></div>
<div className="swrap"><h3>📅 学习日历</h3><div className="sdots">{dots.map((d,i)=><div key={i} className={'sd0'+(d.today?' to':'')+(d.done?' do':'')}>{d.day}</div>)}</div></div>
<div className="reset"><button className="btn btn-out" style={{padding:'8px 16px',fontSize:12,minHeight:32,borderRadius:8}} onClick={()=>{if(confirm('确定重置本年级进度吗？')){localStorage.removeItem(sk(sub,gr,'k'));localStorage.removeItem(sk(sub,gr,'w'));window.location.reload()}}}>🔄 重置进度</button></div>
</div></div>)}
// Init stars + React mount
(function(){const c=document.getElementById('stars');if(!c)return;c.width=window.innerWidth;c.height=window.innerHeight;const ctx=c.getContext('2d');const s=Array.from({length:80},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+0.3,v:Math.random()*0.3+0.1,b:Math.random()}));function d(){ctx.clearRect(0,0,c.width,c.height);s.forEach(t=>{t.b+=(Math.random()-0.5)*0.1;t.b=Math.max(0.2,Math.min(0.8,t.b));ctx.fillStyle=`rgba(255,255,255,${t.b*0.3+0.2})`;ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fill();t.y-=t.v;if(t.y<0){t.y=c.height;t.x=Math.random()*c.width}});requestAnimationFrame(d)};d()})()
const root=createRoot(document.getElementById('root'));root.render(<App/>)
</script></body></html>
