<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>学词宝 - 英语·语文学习</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#2c3e50;touch-action:manipulation}
#app{position:relative;width:100%;height:100%;max-width:480px;margin:0 auto;overflow:hidden;background:#f0f2f5}
.page{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.active{display:flex}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;font-size:16px;font-weight:600;padding:16px 28px;cursor:pointer;min-height:48px;touch-action:manipulation}
.btn:active{transform:scale(.96)}
.btn-primary{background:#4a6cf7;color:#fff}
.btn-outline{background:transparent;border:2px solid #4a6cf7;color:#4a6cf7}
.btn-block{width:100%}.btn-sm{padding:10px 20px;font-size:14px;min-height:40px}
.hd{display:flex;align-items:center;padding:12px 16px;gap:10px;background:#fff;border-bottom:1px solid rgba(0,0,0,.06);flex-shrink:0;min-height:56px}
.hd .bk{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;background:#f0f2f5;border-radius:50%;cursor:pointer;font-size:20px;flex-shrink:0}
.hd h2{flex:1;font-size:17px;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hd .ph{width:36px;flex-shrink:0}
.ct{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px}
/* Home */
.pg0{background:linear-gradient(135deg,#4a6cf7,#3a56d4 60%,#2d3fa0)}
.pg0 .ct{align-items:center;justify-content:center;gap:20px;padding:40px 20px}
.logo{width:80px;height:80px;background:rgba(255,255,255,.2);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:40px}
.ht{color:#fff;font-size:28px;font-weight:800;letter-spacing:2px}
.hs{color:rgba(255,255,255,.7);font-size:14px;text-align:center;line-height:1.6}
.sc{display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;margin-top:12px}
.sci{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:18px 20px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:14px}
.sci:active{transform:scale(.97);background:rgba(255,255,255,.25)}
.sci .ico{font-size:30px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.2);border-radius:12px;flex-shrink:0}
.sci .if{flex:1}.sn{font-size:18px;font-weight:700}.sd{font-size:12px;opacity:.7;margin-top:2px}
.sci .ar{font-size:18px;opacity:.5}
/* Grade Grid */
.gg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.gb{background:#fff;border:2px solid transparent;border-radius:14px;padding:22px 12px;text-align:center;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.gb:active{transform:scale(.97);border-color:#4a6cf7}
.gb .gn{font-size:34px;font-weight:800;color:#4a6cf7}
.gb .gl{font-size:14px;color:#95a5a6;margin-top:4px}
/* Menu */
.mg{display:flex;flex-direction:column;gap:10px}
.mi{background:#fff;border-radius:14px;padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;border:none;text-align:left;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.mi:active{transform:scale(.98)}
.mi .ico{font-size:26px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:#f0f2f5;border-radius:12px;flex-shrink:0}
.mi .if{flex:1}.mi .sn{font-size:16px;font-weight:700}.mi .sd{font-size:12px;color:#95a5a6;margin-top:2px}
.ms{background:#fff;border-radius:14px;padding:12px 16px;display:flex;justify-content:space-around;margin-top:8px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.msi{text-align:center}.msi .mn{font-size:22px;font-weight:800;color:#4a6cf7}
.msi .ml{font-size:11px;color:#95a5a6;margin-top:2px}
.msd{width:1px;background:#eee}
/* Study */
.sp{width:100%;margin-bottom:8px}
.pb{height:5px;background:#e8ecf0;border-radius:3px;overflow:hidden}
.pb .fl{height:100%;background:linear-gradient(90deg,#4a6cf7,#6b8aff);border-radius:3px;transition:width .4s}
.pt{display:flex;justify-content:space-between;font-size:12px;color:#95a5a6;margin-top:4px}
.fc{width:100%;flex:1;min-height:200px;background:#fff;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;position:relative;cursor:pointer;margin-bottom:10px;border:2px solid transparent;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.fc.rv{border-color:#4a6cf7}
.fc .wd{font-size:36px;font-weight:800;color:#2c3e50;margin-bottom:4px;text-align:center;word-break:break-word}
.fc .hint{font-size:13px;color:#95a5a6;opacity:.6}
.fc .ans{font-size:20px;font-weight:700;color:#4a6cf7;text-align:center;margin-top:6px}
.sa{display:flex;gap:10px;width:100%;padding-bottom:4px}
.sa .btn{flex:1}
/* Quiz */
.qi{width:100%;display:flex;justify-content:space-between;font-size:13px;color:#95a5a6;margin-bottom:8px}
.qc{width:100%;background:#fff;border-radius:14px;padding:20px;margin-bottom:12px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.qc .wd{font-size:34px;font-weight:800;margin-bottom:4px}
.qo{display:flex;flex-direction:column;gap:8px;width:100%;flex:1}
.qoi{background:#fff;border:2px solid #e8ecf0;border-radius:12px;padding:14px 16px;font-size:16px;cursor:pointer;text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center}
.qoi:active{transform:scale(.97)}
.qoi.cr{background:#eafaf1;border-color:#2ecc71;color:#2ecc71;font-weight:700}
.qoi.wr{background:#fdedec;border-color:#ff6b6b;color:#ff6b6b}
.qoi.di{pointer-events:none;opacity:.8}
/* Review */
.re{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#95a5a6;gap:10px}
.re .ico{font-size:56px;opacity:.5}
/* Stats */
.sh{background:#fff;border-radius:14px;padding:20px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.sh .bn{font-size:40px;font-weight:800;color:#4a6cf7}
.sh .sb{color:#95a5a6;font-size:14px;margin-top:4px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scd{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.scd .sn{font-size:24px;font-weight:800;color:#4a6cf7}
.scd .sl{font-size:12px;color:#95a5a6;margin-top:2px}
@keyframes pop{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.po{animation:pop .3s ease}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;max-width:300px;text-align:center;pointer-events:none}
</style>
</head>
<body>
<div id="app">
<div id="pg0" class="page active pg0">
  <div class="ct">
    <div class="logo">📚</div>
    <div class="ht">学词宝</div>
    <div class="hs">四年级 → 初一年级<br>英语单词 · 语文生字</div>
    <div class="sc">
      <div class="sci" id="btn-en"><div class="ico">🇬🇧</div><div class="if"><div class="sn">英语单词</div><div class="sd">PEP教材</div></div><div class="ar">›</div></div>
      <div class="sci" id="btn-zh"><div class="ico">🀄</div><div class="if"><div class="sn">语文生字</div><div class="sd">人教版</div></div><div class="ar">›</div></div>
    </div>
  </div>
</div>
<div id="pg1" class="page">
  <div class="hd"><button class="bk" id="b1">‹</button><h2 id="t1">选择年级</h2><div class="ph"></div></div>
  <div class="ct"><div class="gg" id="g1"></div></div>
</div>
<div id="pg2" class="page">
  <div class="hd"><button class="bk" id="b2">‹</button><h2 id="t2">学习中心</h2><div class="ph"></div></div>
  <div class="ct">
    <div class="mg">
      <div class="mi" id="btn-stu"><div class="ico" style="background:#ebf0ff;color:#4a6cf7">📖</div><div class="if"><div class="sn">学习模式</div><div class="sd">看词回想，点击揭晓</div></div><div class="ar">›</div></div>
      <div class="mi" id="btn-quiz"><div class="ico" style="background:#fff3e0;color:#f90">✍️</div><div class="if"><div class="sn">测验模式</div><div class="sd">四选一，检验掌握</div></div><div class="ar">›</div></div>
      <div class="mi" id="btn-rev"><div class="ico" style="background:#fce4ec;color:#ff6b6b">🔄</div><div class="if"><div class="sn">错题复习</div><div class="sd">重温不会的词</div></div><div class="ar">›</div></div>
      <div class="mi" id="btn-stats"><div class="ico" style="background:#e8f5e9;color:#2ecc71">📊</div><div class="if"><div class="sn">学习进度</div><div class="sd">查看统计</div></div><div class="ar">›</div></div>
    </div>
    <div class="ms" id="ms"></div>
  </div>
</div>
<div id="pg3" class="page">
  <div class="hd"><button class="bk" id="b3">‹</button><h2 id="t3">学习</h2><div class="ph"></div></div>
  <div class="ct">
    <div class="sp"><div class="pb"><div class="fl" id="sbar" style="width:0%"></div></div><div class="pt"><span id="spos">1/10</span><span id="spct">0%</span></div></div>
    <div class="fc" id="scard">
      <div class="wd" id="sw">word</div>
      <div class="hint" id="shint">👆 点击显示释义</div>
      <div class="ans" id="sans" style="display:none"></div>
    </div>
    <div class="sa" id="sbtns" style="display:none">
      <button class="btn btn-outline" id="sno" style="flex:1;border-color:#ff6b6b;color:#ff6b6b">😅 还要练</button>
      <button class="btn btn-primary" id="syes" style="flex:1">✅ 知道了</button>
    </div>
  </div>
</div>
<div id="pg4" class="page">
  <div class="hd"><button class="bk" id="b4">‹</button><h2 id="t4">测验</h2><div class="ph"></div></div>
  <div class="ct">
    <div class="qi"><span id="qpos">第 1 题</span><span id="qscore">✓ 0 | ✗ 0</span></div>
    <div class="qc"><div class="wd" id="qw">word</div></div>
    <div class="qo" id="qopts"></div>
  </div>
</div>
<div id="pg5" class="page">
  <div class="hd"><button class="bk" id="b5">‹</button><h2>错题复习</h2><div class="ph"></div></div>
  <div class="ct" id="rct"></div>
</div>
<div id="pg6" class="page">
  <div class="hd"><button class="bk" id="b6">‹</button><h2>学习进度</h2><div class="ph"></div></div>
  <div class="ct" id="sct"></div>
</div>
</div>
<script>
var WORDS = {en:{4:[["classroom","教室"],["window","窗户"],["door","门"],["book","书"],["pen","钢笔"],["teacher","老师"],["student","学生"],["family","家庭"],["bed","床"],["table","桌子"],["water","水"],["read","读"],["write","写"],["run","跑"],["jump","跳"],["sing","唱歌"],["dance","跳舞"],["swim","游泳"],["eat","吃"],["drink","喝"],["big","大的"],["small","小的"],["long","长的"],["tall","高的"],["short","矮的"],["beautiful","美丽的"],["cute","可爱的"],["music","音乐"],["science","科学"],["art","美术"],["breakfast","早餐"],["lunch","午餐"],["dinner","晚餐"]],5:[["Monday","星期一"],["Tuesday","星期二"],["Wednesday","星期三"],["Thursday","星期四"],["Friday","星期五"],["Saturday","星期六"],["Sunday","星期日"],["spring","春天"],["summer","夏天"],["autumn","秋天"],["winter","冬天"],["sunny","晴朗"],["rainy","下雨"],["cloudy","多云"],["windy","有风"],["warm","温暖"],["hot","热"],["cool","凉爽"],["cold","冷"],["forest","森林"],["river","河流"],["lake","湖"],["mountain","山"],["park","公园"],["library","图书馆"],["delicious","美味"],["fresh","新鲜"],["healthy","健康"],["sweet","甜"],["favourite","最喜欢"]],6:[["subway","地铁"],["train","火车"],["plane","飞机"],["bus","公交车"],["bike","自行车"],["taxi","出租车"],["walk","步行"],["museum","博物馆"],["bookstore","书店"],["cinema","电影院"],["hospital","医院"],["doctor","医生"],["nurse","护士"],["driver","司机"],["farmer","农民"],["singer","歌手"],["writer","作家"],["hobby","爱好"],["yesterday","昨天"],["trip","旅行"],["holiday","假日"],["photo","照片"],["gift","礼物"]],7:[["parent","父母"],["grandfather","祖父"],["grandmother","祖母"],["friend","朋友"],["teacher","老师"],["classmate","同学"],["subject","科目"],["history","历史"],["geography","地理"],["biology","生物"],["favourite","最喜欢"],["difficult","困难"],["interesting","有趣"],["easy","容易"],["hamburger","汉堡"],["sandwich","三明治"],["salad","沙拉"],["apple","苹果"],["banana","香蕉"],["tomato","西红柿"],["basketball","篮球"],["soccer","足球"],["dog","狗"],["cat","猫"],["panda","熊猫"],["tiger","老虎"],["early","早"],["late","晚"],["usually","通常"],["always","总是"],["rule","规则"]]},zh:{4:[["潮","潮水"],["涨","涨潮"],["隐","隐藏"],["约","约定"],["窄","狭窄"],["罩","笼罩"],["昂","昂首"],["观","观察"],["惯","习惯"],["渡","渡口"],["裂","裂开"],["沃","肥沃"],["属","属于"],["悬","悬挂"],["崖","山崖"],["燃","燃烧"],["炼","锻炼"],["域","领域"],["途","路途"],["肃","肃静"],["振","振奋"],["旷","空旷"],["尝","尝试"],["赚","赚钱"],["购","购买"],["售","销售"]],5:[["窃","偷窃"],["惧","恐惧"],["撑","支撑"],["偿","偿还"],["愧","惭愧"],["魂","灵魂"],["瘾","上瘾"],["籍","书籍"],["肺","肺腑"],["坠","坠落"],["谨","谨慎"],["慎","慎重"],["疾","疾病"],["殿","宫殿"],["廊","走廊"],["博","博士"],["览","游览"],["诞","诞生"],["颂","歌颂"],["毅","毅力"]],6:[["邀","邀请"],["俯","俯视"],["瀑","瀑布"],["峭","峭壁"],["躯","身躯"],["蕴","蕴含"],["谧","静谧"],["巷","小巷"],["勤","勤奋"],["勉","勉励"],["挚","真挚"],["寝","寝室"],["斑","斑点"],["怨","抱怨"],["承","承担"],["肩","肩膀"],["樱","樱花"]],7:[["絮","柳絮"],["倚","倚靠"],["瞒","隐瞒"],["诀","诀别"],["惶","惶恐"],["焦","焦虑"],["慕","羡慕"],["撒","撒网"],["蜷","蜷缩"],["慨","感慨"],["吟","吟诵"],["墟","废墟"],["狭","狭窄"],["隘","狭隘"],["瞬","瞬间"],["凝","凝视"],["颓","颓废"],["怯","胆怯"],["鄙","鄙视"]]}};

var curSubj = null;
var curGrade = null;
var sOrder = [];
var sIdx = 0;
var cardRv = false;
var qData = null;
var rList = [];
var rIdx = 0;
var rRv = false;

function $(id) { return document.getElementById(id); }
function wds() { return WORDS[curSubj][curGrade]; }
function tw() { return wds().length; }

function skey(s) { return 'xcb_'+curSubj+'_'+curGrade+'_'+s; }
function lset(k) { try{return new Set(JSON.parse(localStorage.getItem(skey(k))||'[]'))}catch(e){return new Set()} }
function sset(k,s) { localStorage.setItem(skey(k),JSON.stringify([...s])); }
function known() { return lset('k'); }
function akn(i) { var s=known();s.add(i);sset('k',s); }
function wrng() { return lset('w'); }
function awr(i) { var s=wrng();s.add(i);sset('w',s); }
function rwr(i) { var s=wrng();s.delete(i);sset('w',s); }
function wlist() { return[...wrng()].sort(function(a,b){return a-b}); }
function sf(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t}return a}

function showPage(id) {
  var els = document.querySelectorAll('.page');
  for(var i=0;i<els.length;i++) els[i].classList.remove('active');
  $(id).classList.add('active');
}

function goHome() { showPage('pg0'); }
function goMenu() { showPage('pg2'); uStats(); }

function selSubj(s) {
  curSubj = s;
  $('t1').textContent = s==='en'?'选择年级 - 英语':'选择年级 - 语文';
  var g = $('g1'); g.innerHTML = '';
  [[4,'四年级'],[5,'五年级'],[6,'六年级'],[7,'初一年级']].forEach(function(a){
    var d = document.createElement('div'); d.className = 'gb';
    d.innerHTML = '<div class="gn">'+a[0]+'</div><div class="gl">'+a[1]+'</div>';
    d.addEventListener('click', function(){ selGrade(a[0]); });
    g.appendChild(d);
  });
  showPage('pg1');
}

function selGrade(g) {
  curGrade = g;
  var nm = {4:'四年级',5:'五年级',6:'六年级',7:'初一年级'};
  $('t2').textContent = (curSubj==='en'?'英语':'语文')+' · '+nm[g];
  showPage('pg2');
  uStats();
}

function uStats() {
  var kn = known().size, t = tw(), wr = wrng().size;
  $('ms').innerHTML = kn||wr
    ? '<div class="msi"><div class="mn">'+kn+'</div><div class="ml">已掌握</div></div><div class="msd"></div><div class="msi"><div class="mn">'+t+'</div><div class="ml">总词数</div></div><div class="msd"></div><div class="msi"><div class="mn">'+wr+'</div><div class="ml">待复习</div></div>'
    : '<div style="text-align:center;color:#999;font-size:14px;width:100%">开始学习吧 📖</div>';
}

function startStudy() {
  var nm = {4:'四年级',5:'五年级',6:'六年级',7:'初一年级'};
  $('t3').textContent = (curSubj==='en'?'英语 ':'语文 ')+nm[curGrade]+' · 学习';
  sOrder = sf([...Array(tw()).keys()]);
  sIdx = 0; cardRv = false;
  showPage('pg3');
  showCard();
}

function showCard() {
  var w = wds()[sOrder[sIdx]]; cardRv = false;
  $('scard').classList.remove('rv');
  $('sw').textContent = w[0];
  $('shint').textContent = '👆 点击显示释义';
  $('shint').style.display = 'block';
  $('sans').style.display = 'none'; $('sans').textContent = '';
  $('sbtns').style.display = 'none';
  var p = ((sIdx+1)/sOrder.length*100).toFixed(0);
  $('sbar').style.width = p+'%';
  $('spos').textContent = (sIdx+1)+'/'+sOrder.length;
  $('spct').textContent = p+'%';
}

function rvCard() {
  if (cardRv) return; cardRv = true;
  var w = wds()[sOrder[sIdx]];
  $('scard').classList.add('rv');
  $('shint').style.display = 'none';
  $('sans').textContent = w[1];
  $('sans').style.display = 'block';
  $('sbtns').style.display = 'flex';
}

function mk(k) {
  var i = sOrder[sIdx];
  if (k) { akn(i); rwr(i); } else awr(i);
  sIdx++;
  if (sIdx >= sOrder.length) { goMenu(); return; }
  showCard();
}

function startQuiz() {
  var nm = {4:'四年级',5:'五年级',6:'六年级',7:'初一年级'};
  $('t4').textContent = (curSubj==='en'?'英语 ':'语文 ')+nm[curGrade]+' · 测验';
  var ord = sf([...Array(tw()).keys()]);
  var t = Math.min(ord.length,20);
  qData = {c:0,w:0,t:t,a:ord.slice(0,t),i:0,d:false};
  showPage('pg4');
  showQ();
}

function showQ() {
  if (qData.i >= qData.t) { showQR(); return; }
  qData.d = false;
  var idx = qData.a[qData.i], w = wds()[idx], al = wds();
  $('qw').textContent = w[0];
  $('qpos').textContent = '第 '+(qData.i+1)+' 题 / 共 '+qData.t+' 题';
  $('qscore').textContent = '✓ '+qData.c+' | ✗ '+qData.w;
  var op = [idx], pl = [];
  for(var i=0;i<al.length;i++){if(i!==idx)pl.push(i)}
  sf(pl);
  for(var i=0;i<3&&i<pl.length;i++)op.push(pl[i]);
  sf(op);
  var ci = op.indexOf(idx);
  var h = '';
  for(var i=0;i<op.length;i++) {
    h += '<div class="qoi" data-ci="'+ci+'" data-chosen="'+i+'">'+al[op[i]][1]+'</div>';
  }
  $('qopts').innerHTML = h;
  // Bind click events
  var opts = $('qopts').querySelectorAll('.qoi');
  for(var i=0;i<opts.length;i++) {
    opts[i].addEventListener('click', function(){
      if (qData.d) return;
      var ci = parseInt(this.getAttribute('data-ci'));
      var chosen = parseInt(this.getAttribute('data-chosen'));
      ansQ(chosen, ci);
    });
  }
}

function ansQ(chosen, correct) {
  qData.d = true;
  var isCorrect = (chosen === correct);
  if (isCorrect) qData.c++; else qData.w++;
  var opts = $('qopts').querySelectorAll('.qoi');
  for(var i=0;i<opts.length;i++) {
    opts[i].classList.add('di');
    var ci = parseInt(opts[i].getAttribute('data-ci'));
    var ch = parseInt(opts[i].getAttribute('data-chosen'));
    if (ch === correct) opts[i].classList.add('cr');
    else if (ch === chosen && !isCorrect) opts[i].classList.add('wr');
  }
  if (!isCorrect) awr(qData.a[qData.i]);
  $('qscore').textContent = '✓ '+qData.c+' | ✗ '+qData.w;
  setTimeout(function(){ qData.i++; showQ(); }, 800);
}

function showQR() {
  var p = qData.t?Math.round(qData.c/qData.t*100):0, e=p>=90?'🏆':p>=70?'🌟':p>=50?'👍':'💪';
  $('qopts').innerHTML = '<div style="text-align:center;padding:30px 20px"><div style="font-size:56px;margin-bottom:12px">'+e+'</div><div style="font-size:40px;font-weight:800;color:#4a6cf7">'+qData.c+'/'+qData.t+'</div><div style="font-size:15px;color:#999;margin:6px 0">正确率 '+p+'%</div><div style="margin-top:20px"><button class="btn btn-primary" onclick="goMenu()">返回</button></div></div>';
}

function openReview() {
  var l = wlist();
  if (!l.length) {
    $('rct').innerHTML = '<div class="re"><div class="ico">🎉</div><div>没有要复习的词</div></div>';
    showPage('pg5'); return;
  }
  rList = l; rIdx = 0; rRv = false;
  showRCard();
  showPage('pg5');
}

function showRCard() {
  if (rIdx >= rList.length) {
    $('rct').innerHTML = '<div class="re"><div class="ico">🎉</div><div>全部复习完毕</div><div style="margin-top:16px"><button class="btn btn-primary" onclick="goMenu()">返回</button></div></div>';
    return;
  }
  var w = wds()[rList[rIdx]]; rRv = false;
  $('rct').innerHTML = '<div class="sp"><div class="pb"><div class="fl" style="width:'+((rIdx+1)/rList.length*100).toFixed(0)+'%"></div></div><div class="pt"><span>'+(rIdx+1)+'/'+rList.length+'</span><span>错题复习</span></div></div>'
    + '<div class="fc" id="rcard"><div class="wd" id="rw">'+w[0]+'</div><div class="hint" id="rhint">👆 点击显示释义</div><div class="ans" id="rans" style="display:none">'+w[1]+'</div></div>'
    + '<div class="sa" id="rbtns" style="display:none"><button class="btn btn-outline" id="rno" style="flex:1;border-color:#ff6b6b;color:#ff6b6b">😅 还要练</button><button class="btn btn-primary" id="ryes" style="flex:1">✅ 记住了</button></div>';
  $('rcard').addEventListener('click', rvR);
  $('rno').addEventListener('click', function(){ nextR(false); });
  $('ryes').addEventListener('click', function(){ nextR(true); });
}

function rvR() {
  if (rRv) return; rRv = true;
  $('rhint').style.display = 'none';
  $('rans').style.display = 'block';
  $('rbtns').style.display = 'flex';
}

function nextR(k) {
  var i = rList[rIdx];
  if (k) { rwr(i); akn(i); } else awr(i);
  rIdx++;
  showRCard();
}

function showStats() {
  var t = tw(), kn = known().size, wr = wrng().size, p = t?Math.round(kn/t*100):0;
  var sn = curSubj==='en'?'英语':'语文', gn = {4:'四年级',5:'五年级',6:'六年级',7:'初一年级'}[curGrade];
  $('sct').innerHTML = '<div class="sh"><div class="bn">'+p+'%</div><div class="sb">'+sn+' · '+gn+' 掌握率</div></div>'
    + '<div class="sg"><div class="scd"><div class="sn" style="color:#4a6cf7">'+kn+'</div><div class="sl">已掌握</div></div>'
    + '<div class="scd"><div class="sn">'+t+'</div><div class="sl">总词数</div></div>'
    + '<div class="scd"><div class="sn" style="color:#ff6b6b">'+wr+'</div><div class="sl">待复习</div></div>'
    + '<div class="scd"><div class="sn" style="color:#2ecc71">'+(t-kn)+'</div><div class="sl">待学习</div></div></div>'
    + '<div style="margin-top:12px"><div class="pb" style="height:10px;border-radius:5px"><div class="fl" style="width:'+p+'%;border-radius:5px"></div></div></div>'
    + '<div style="margin-top:16px;text-align:center"><button class="btn btn-outline btn-sm" onclick="rst()">🔄 重置进度</button></div>';
  showPage('pg6');
}

function rst() {
  if (!confirm('确定重置本年级进度吗？')) return;
  localStorage.removeItem(skey('k')); localStorage.removeItem(skey('w'));
  showStats(); uStats();
}

function init() {
  $('btn-en').addEventListener('click', function(){ selSubj('en'); });
  $('btn-zh').addEventListener('click', function(){ selSubj('zh'); });
  $('b1').addEventListener('click', goHome);
  $('b2').addEventListener('click', function(){ showPage('pg1'); });
  $('b3').addEventListener('click', function(){ goMenu(); });
  $('b4').addEventListener('click', function(){ goMenu(); });
  $('b5').addEventListener('click', goMenu);
  $('b6').addEventListener('click', goMenu);
  $('btn-stu').addEventListener('click', startStudy);
  $('btn-quiz').addEventListener('click', startQuiz);
  $('btn-rev').addEventListener('click', openReview);
  $('btn-stats').addEventListener('click', showStats);
  $('scard').addEventListener('click', rvCard);
  $('sno').addEventListener('click', function(){ mk(false); });
  $('syes').addEventListener('click', function(){ mk(true); });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
